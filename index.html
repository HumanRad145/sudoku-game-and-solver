            <tr> <td>9 <td>  <td>  <td>8 <td>  <td>2 <td>  <td>  <td>5
    </table>

    <br>
    <div id="buttons" align="center">
        <button id="solve_button" type="button" onclick="solveSoduku();">Solve</button>

        <button id="clear_button" type="button" onclick="clearBoard();">Clear</button>

        <button id="undo_button" typ="button" onclick="undoSolve();">Undo</button>

</html>
