<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="style.css">
    <script src="play.js" defer></script>
</head>
<body>
    <div id="header-container">
        <a href="index.html">
            <div class="headButton">
                <h2> Sudoku Solver </h2>
            </div>
        </a>
        <a href="solve.html"> 
            <div class="headButton">
                <h2> Play </h2>
            </div>
        </a>
    </div>

    <div id="difficulty" align="center">
        <p class="diff-btn">Easy</p>
        <p class="diff-btn">Hard</p>
        <p class="diff-btn">Extreme</p>
    </div>
    
    <div id="sudoku-grid">
        <table id="sudoku" align="center" style="margin-bottom: 25px;">
            <colgroup><col><col><col></colgroup>
            <colgroup><col><col><col></colgroup>
            <colgroup><col><col><col></colgroup>
            <tbody>
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>
            <tbody>
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td> 
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td> 
            <tbody>
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td> 
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>
                <tr> <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td>  <td> 
        </table>
    </div>

    
    <div id="sudoku-controls">
        <button class="ctrl-btn" type="button" >1</button>
        <button class="ctrl-btn" type="button">2</button>
        <button class="ctrl-btn" type="button">3</button>
        <button class="ctrl-btn" type="button">4</button>
        <button class="ctrl-btn" type="button">5</button>
        <button class="ctrl-btn" type="button">6</button>
        <button class="ctrl-btn" type="button">7</button>
        <button class="ctrl-btn" type="button">8</button>
        <button class="ctrl-btn" type="button">9</button>
    </div>
    
    <br>
    <div id="buttons" align="center">
        <a href="index.html" id="go-back-to-solver"> Solve this with sudoku solver </a>
    </div>
    
    <div id="solved-popup-window">
        <div class="window-content">
            <h2> YAY! You've solved it. </h2>
            <br>
            <button class="exit-btn"> Exit </button>
            <button class="diff-btn"> Retry </button>
        </div>
    </div>

    <div id="wrong-popup-window">
        <div class="window-content">
            <h2> Oops! You've made some mistakes. </h2>
        </div>
    </div>

</body>
</html>
